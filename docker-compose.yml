version: '3.9'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      BASE_URL: http://localhost:8080
      FHISH_RELAYER_SECRET: ${FHISH_RELAYER_SECRET}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      RPC_URL: ${RPC_URL:-https://ethereum-sepolia.publicnode.com}
    volumes:
      - ./keys:/app/keys:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
